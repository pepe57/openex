name: Auto Close and Solve Issues
on:
  pull_request:
    branches:
      - release/current
      - master
    types:
      - closed
permissions:
  contents: read
  issues: write
  pull-requests: read
jobs:
  extract_issue_number:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      issue_numbers: ${{ steps.extract.outputs.issue_numbers }}
    steps:
      - name: Extract issue numbers from PR title and body
        id: extract
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '';
            const fullText = `${prTitle}\n${prBody}`;

            core.info(`PR Title: ${prTitle}`);

            // GitHub closing keywords (case-insensitive)
            // https://docs.github.com/en/issues/tracking-your-work-with-issues/linking-a-pull-request-to-an-issue
            const closingPattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;

            const matches = [...fullText.matchAll(closingPattern)];
            const issueNumbers = [...new Set(matches.map(m => m[1]))];

            if (issueNumbers.length > 0) {
              core.info(`Found ${issueNumbers.length} issue(s) to close: ${issueNumbers.join(', ')}`);
              core.setOutput('issue_numbers', issueNumbers.join(' '));
            } else {
              core.warning('No closing keywords found — no issues will be closed');
              core.setOutput('issue_numbers', '');
            }

  auto_close_and_solve:
    needs: extract_issue_number
    if: needs.extract_issue_number.outputs.issue_numbers != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Add "solved" label and close issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumbers = "${{ needs.extract_issue_number.outputs.issue_numbers }}"
              .split(' ')
              .filter(num => num.trim() !== '');

            core.info(`Processing ${issueNumbers.length} issue(s): ${issueNumbers.join(', ')}`);
            core.startGroup('Processing Issues');

            let successCount = 0;
            let failureCount = 0;

            for (const issueNumber of issueNumbers) {
              try {
                core.startGroup(`Issue #${issueNumber}`);

                // Add "solved" label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNumber),
                  labels: ["solved"]
                });
                core.info(`✓ Added "solved" label`);

                // Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNumber),
                  state: "closed"
                });
                core.info(`✓ Closed issue`);

                successCount++;
                core.endGroup();

              } catch (error) {
                core.error(`✗ Failed to process issue #${issueNumber}: ${error.message}`);
                failureCount++;
                core.endGroup();
              }
            }

            core.endGroup();

            // Summary
            core.notice(`Successfully processed ${successCount} issue(s)`);
            if (failureCount > 0) {
              core.warning(`Failed to process ${failureCount} issue(s)`);
            }
