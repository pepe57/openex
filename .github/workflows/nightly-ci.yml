          if-no-files-found: warn

      - name: Run E2E tests (${{ matrix.engine.name }} / ${{ matrix.browser }})
        working-directory: openaev-front
        run: >-
          yarn playwright test --config playwright.nightly.config.ts
          --project=setup --project=${{ matrix.browser }} --workers=1
          --retries=2
        env:
          APP_URL: http://localhost:8080
          E2E_COVERAGE: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-arm-${{ matrix.engine.name }}-${{ matrix.browser }}
          path: openaev-front/test-results/


