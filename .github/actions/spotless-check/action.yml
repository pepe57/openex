name: Spotless Check
description: Check Java code formatting with Spotless (Google Java Format)

runs:
  using: composite
  steps:
    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        java-version: "21"
        distribution: temurin
        cache: maven
    - name: Check formatting
      run: mvn -B -ntp spotless:check
      shell: bash

